openapi: 3.0.3

info:
  title: Company Versioning API
  description: |
    REST API for storing and versioning company data.
    Every change to the `name` or `address` fields automatically creates a new snapshot.
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Local Docker

tags:
  - name: Company
    description: Manage companies and their versions

paths:
  /company:
    post:
      tags: [Company]
      summary: Create or update a company
      description: |
        Upsert operation keyed by `edrpou`:
        - Company does not exist — created (version 1, HTTP 201).
        - Data changed — new version saved (HTTP 200, status=updated).
        - Data identical — no new version created (HTTP 200, status=duplicate).

        Fields `name` and `address` are trimmed before comparison.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyInput'
            examples:
              new_company:
                summary: New company
                value:
                  name: "Acme Corporation"
                  edrpou: "37027819"
                  address: "123 Main St, New York, NY 10001"
              update_address:
                summary: Update address
                value:
                  name: "Acme Corporation"
                  edrpou: "37027819"
                  address: "456 Broadway, New York, NY 10013"
      responses:
        '201':
          description: Company created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertResponse'
              example:
                status: created
                company_id: 1
                version: 1
        '200':
          description: Data updated or unchanged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertResponse'
              examples:
                updated:
                  summary: Data changed
                  value:
                    status: updated
                    company_id: 1
                    version: 2
                duplicate:
                  summary: Data unchanged
                  value:
                    status: duplicate
                    company_id: 1
                    version: 2
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              example:
                message: "The name field is required."
                errors:
                  name: ["The name field is required."]

  /company/{edrpou}/versions:
    get:
      tags: [Company]
      summary: Get all versions of a company
      description: |
        Returns all saved versions in chronological order (version ASC).

        `edrpou` in the path must contain digits only (1–10 characters),
        otherwise the route does not match and 404 is returned.
      parameters:
        - name: edrpou
          in: path
          required: true
          description: Company registration code (digits only, 1–10 characters)
          schema:
            type: string
            pattern: '^[0-9]{1,10}$'
            example: "37027819"
      responses:
        '200':
          description: List of versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionsResponse'
              example:
                company_id: 1
                edrpou: "37027819"
                versions:
                  - id: 1
                    version: 1
                    name: "Acme Corporation"
                    edrpou: "37027819"
                    address: "123 Main St, New York, NY 10001"
                    created_at: "2026-03-09T10:00:00.000000Z"
                  - id: 2
                    version: 2
                    name: "Acme Corporation"
                    edrpou: "37027819"
                    address: "456 Broadway, New York, NY 10013"
                    created_at: "2026-03-09T11:00:00.000000Z"
        '404':
          description: Company not found or edrpou is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
              example:
                message: "Not Found"

components:
  schemas:
    CompanyInput:
      type: object
      required: [name, edrpou, address]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 256
          description: Company name
          example: "Acme Corporation"
        edrpou:
          type: string
          pattern: '^[0-9]{1,10}$'
          description: Company registration code (digits only, 1–10 characters)
          example: "37027819"
        address:
          type: string
          description: Legal address
          example: "123 Main St, New York, NY 10001"

    UpsertResponse:
      type: object
      properties:
        status:
          type: string
          enum: [created, updated, duplicate]
          description: Operation result
        company_id:
          type: integer
          description: Primary key of the company
        version:
          type: integer
          description: Current version number

    CompanyVersion:
      type: object
      properties:
        id:
          type: integer
        version:
          type: integer
        name:
          type: string
        edrpou:
          type: string
        address:
          type: string
        created_at:
          type: string
          format: date-time

    VersionsResponse:
      type: object
      properties:
        company_id:
          type: integer
        edrpou:
          type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/CompanyVersion'

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    NotFound:
      type: object
      properties:
        message:
          type: string
          example: "Not Found"
